<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Corazón animado</title>

<!-- ✍️ FUENTES BONITAS -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

/* 🔥 FONDO DIFUMINADO */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("https://i.pinimg.com/1200x/4c/86/f2/4c86f2d827bb498fb93d551f9094de65.jpg") no-repeat center/cover;
    filter: blur(30px) brightness(0.6);
    transform: scale(1.2);
    z-index: 0;
}

/* 🖼️ IMAGEN PRINCIPAL */
body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("https://i.pinimg.com/1200x/4c/86/f2/4c86f2d827bb498fb93d551f9094de65.jpg") no-repeat center;
    background-size: contain;
    z-index: 1;
}

/* ❤️ CORAZONES */
.heart {
    position: absolute;
    color: #ff4d6d;
    font-size: 14px;
    animation: fall 5s linear infinite;
    z-index: 2;
}

@keyframes fall {
    from {
        transform: translateY(-100vh);
        opacity: 1;
    }
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}

/* 💖 TEXTO PRINCIPAL */
#message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    font-family: 'Great Vibes', cursive;
    font-size: 70px;

    color: #ffd6e0;
    text-align: center;

    text-shadow:
        0 0 10px rgba(255,255,255,0.8),
        0 0 20px rgba(255,105,180,0.6),
        0 0 30px rgba(255,20,147,0.5);

    opacity: 0;
    transition: opacity 2s;
    z-index: 3;
}
</style>
</head>
<button onclick="window.location.href='index.html'" 
style="position: absolute; top: 20px; left: 20px; padding: 10px 15px; border-radius: 20px; border: none; background: #ff4d6d; color: white; cursor: pointer; z-index: 5;">
⬅ Volver
</button>

<body>

<div id="message">I love you Inés ❤️</div>

<script>
const total = 200;

// ❤️ CORAZONES
for (let i = 0; i < total; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(heart);
}

// 💖 FORMAR CORAZÓN
function createHeartShape() {
    const width = window.innerWidth / 2;
    const height = window.innerHeight / 2;

    let t = 0;
    let interval = setInterval(() => {
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";

        heart.style.left = width + x * 15 + "px";
        heart.style.top = height + y * 15 + "px";
        heart.style.animation = "none";

        document.body.appendChild(heart);

        t += 0.1;
        if (t > Math.PI * 2) {
            clearInterval(interval);

            setTimeout(() => {
                document.getElementById("message").style.opacity = 1;
            }, 1000);
        }
    }, 50);
}

// ⏳ INICIO
setTimeout(createHeartShape, 3000);
</script>

</body>
</html>

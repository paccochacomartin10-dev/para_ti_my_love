<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<!-- 📱 ESTA LINEA HACE QUE SE VEA BIEN EN CELULAR -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para Inés ❤️</title>

<!-- ✍️ FUENTES BONITAS -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: black;
}

/* 🌫️ FONDO DIFUMINADO */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("https://i.pinimg.com/1200x/b9/6d/1f/b96d1ff56717915e3f88743a43c91570.jpg") no-repeat center/cover;
    background-position: 0% 30%;
    filter: blur(3px) brightness(0.3);
    transform: scale(1.2);
}

/* 🎬 TRANSICIÓN */
.transition {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    top: 0;
    left: 0;
    opacity: 1;
    transition: opacity 0.6s ease;
    z-index: 999;
}

/* 🔝 BARRA DE NAVEGACIÓN */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px 0;
    z-index: 1000;
    border-bottom: 1px solid rgba(255, 105, 180, 0.3);
    backdrop-filter: blur(5px);
}

.navbar ul {
    list-style: none;
    display: flex;
    justify-content: center;
    gap: 30px;
}

.navbar a {
    color: #ffe4ec;
    text-decoration: none;
    font-size: 16px;
    transition: 0.3s;
    font-family: 'Poppins', sans-serif;
}

.navbar a:hover {
    color: #ff85a2;
    text-shadow: 0 0 10px rgba(255,105,180,0.7);
}

/* CONTENEDOR */
.container {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    padding-top: 80px;
}

/* 💖 TITULO */
.title {
    font-family: 'Playfair Display', serif;
    font-size: 60px;
    color: #ffe4ec;
    text-shadow: 0 0 15px rgba(255,105,180,0.6);
    margin-bottom: 15px;
}

/* ✨ TEXTO */
.subtitle {
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    color: #f8f8f8;
    max-width: 600px;
    line-height: 1.7;
    margin-bottom: 40px;
    text-shadow: 0 0 8px rgba(0,0,0,0.7);
}

/* BOTONES */
.btn {
    padding: 15px 40px;
    margin: 10px;
    font-size: 18px;
    border-radius: 40px;
    border: none;
    cursor: pointer;
    color: white;
    font-family: 'Poppins', sans-serif;

    background: linear-gradient(45deg, #ff4d6d, #ff85a2);
    box-shadow: 0 0 15px rgba(255,105,180,0.6);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px rgba(255,105,180,1);
}

/* ❤️ CORAZONES */
.heart {
    position: absolute;
    color: #ff6b81;
    font-size: 14px;
    animation: floatUp linear infinite;
    z-index: 2;
}

@keyframes floatUp {
    from { transform: translateY(0); opacity: 0.8; }
    to { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🔝 BARRA DE MENU -->
<nav class="navbar">
    <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="index1.html">Ver Carta</a></li>
        <li><a href="index2.html">Ver Sorpresa</a></li>
    </ul>
</nav>

<div class="transition" id="transition"></div>

<div class="container">
    <div class="title">Para ti, Inés ❤️</div>

    <div class="subtitle">
        Este pequeño sitio no es solo código…<br><br>
        Es mi forma de demostrarte lo mucho que significas para mí.<br>
        Cada detalle, cada animación y cada palabra<br>
        fueron hechos pensando en ti 💖
    

<script>

/* ENTRADA SUAVE */
window.onload = () => {
    document.getElementById("transition").style.opacity = 0;
};

/* TRANSICIÓN */
function goTo(page) {
    const t = document.getElementById("transition");
    t.style.opacity = 1;

    setTimeout(() => {
        window.location.href = page;
    }, 600);
}

/* ❤️ CORAZONES */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = (window.innerWidth / 2 + (Math.random()*200 - 100)) + "px";
    heart.style.top = window.innerHeight + "px";
    heart.style.animationDuration = (Math.random() * 3 + 4) + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 7000);
}, 500);

</script>

</body>
</html>
